# .github/workflows/ci.yml
name: CI – Tests, Coverage & Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend – TypeScript + Jest
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    env:
      NODE_ENV: test
      JWT_SECRET: dev-secret-key
      MONGODB_URI_TEST: mongodb://localhost:27017/exam_test_ci

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()   
        with:
          name: backend-coverage-${{ github.run_number }}
          path: backend/coverage/
          retention-days: 14

  
  backend-api-newman:
    name: Backend — Newman API
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    env:
      NODE_ENV: production
      JWT_SECRET: ci-test-secret-key
      MONGODB_URI: mongodb://localhost:27017/exam_platform_newman

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build backend
        run: npm run build

      - name: Start API server
        run: |
          node dist/server.js &
          echo $! > /tmp/backend.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/api/health && exit 0
            sleep 1
          done
          echo "Server did not become ready"
          exit 1

      - name: Run Newman collection
        run: npm run test:api

      - name: Upload Newman report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report-${{ github.run_number }}
          path: backend/postman/newman-report.json
          retention-days: 14

  frontend-test:
    name: Frontend – TypeScript + Vitest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vue TypeScript type-check
        run: npx vue-tsc -b

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-${{ github.run_number }}
          path: frontend/coverage/
          retention-days: 14

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-test, backend-api-newman, frontend-test]
    if: always()

    steps:
      - name: Evaluate all quality gates
        run: |
          echo "Backend tests (Jest)   : ${{ needs.backend-test.result }}"
          echo "Backend tests (Newman) : ${{ needs.backend-api-newman.result }}"
          echo "Frontend tests         : ${{ needs.frontend-test.result }}"

          if [[ "${{ needs.backend-test.result }}"       != "success" || \
                "${{ needs.backend-api-newman.result }}" != "success" || \
                "${{ needs.frontend-test.result }}"      != "success" ]]; then
            echo ""
            echo " QUALITY GATE FAILED"
            echo "    One or more jobs did not pass."
            echo "    Fix failing tests / type errors / coverage drops before merging."
            exit 1
          fi

          echo ""
          echo " QUALITY GATE PASSED"
          echo "    All tests green · TypeScript clean · Coverage thresholds met."