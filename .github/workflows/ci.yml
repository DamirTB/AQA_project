# .github/workflows/ci.yml
name: CI – Tests, Coverage & Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Backend – TypeScript check + Jest (unit + integration)
  # ─────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend – TypeScript + Jest
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        # Wait until MongoDB is actually ready before running tests
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    env:
      NODE_ENV: test
      JWT_SECRET: dev-secret-key
      MONGODB_URI_TEST: mongodb://localhost:27017/exam_test_ci

    defaults:
      run:
        working-directory: backend

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      # Quality Gate QG07 — zero TypeScript errors allowed
      - name: 🔷 TypeScript type-check
        run: npx tsc --noEmit

      # Quality Gates QG01, QG03, QG04
      # coverageThreshold in jest.config.js enforces QG01 (≥80% coverage)
      # Any failing test exits non-zero → enforces QG03 (0 failing tests)
      - name: 🧪 Run tests with coverage
        run: npm run test:coverage

      - name: 📊 Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()   # Upload even if tests fail — useful for debugging
        with:
          name: backend-coverage-${{ github.run_number }}
          path: backend/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Frontend – TypeScript check + Vitest (unit + component)
  # ─────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend – TypeScript + Vitest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      # Quality Gate QG07 — Vue + TypeScript type check
      - name: 🔷 Vue TypeScript type-check
        run: npx vue-tsc -b

      # Quality Gates QG02, QG03
      # thresholds in vite.config.ts enforces QG02 (≥70% coverage)
      - name: 🧪 Run tests with coverage
        run: npm run test:coverage

      - name: 📊 Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-${{ github.run_number }}
          path: frontend/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Quality Gate — single required status check for branch protection
  # ─────────────────────────────────────────────────────────────────
  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    # Always run this job so the status check always appears on PRs,
    # even when upstream jobs are cancelled or skipped.
    if: always()

    steps:
      - name: Evaluate all quality gates
        run: |
          echo "Backend tests : ${{ needs.backend-test.result }}"
          echo "Frontend tests: ${{ needs.frontend-test.result }}"

          if [[ "${{ needs.backend-test.result }}"  != "success" || \
                "${{ needs.frontend-test.result }}" != "success" ]]; then
            echo ""
            echo "❌  QUALITY GATE FAILED"
            echo "    One or more jobs did not pass."
            echo "    Fix failing tests / type errors / coverage drops before merging."
            exit 1
          fi

          echo ""
          echo "✅  QUALITY GATE PASSED"
          echo "    All tests green · TypeScript clean · Coverage thresholds met."