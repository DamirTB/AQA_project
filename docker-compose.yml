version: "3.8"

services:
  mongo:
    image: mongo:latest
    container_name: exam-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exam-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/exam-platform
      - JWT_SECRET=exam-platform-secret-key-change-in-prod
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exam-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  mongo-data:
